name: Deploy

on:
  push:
    branches:
      - staging
      - prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "env=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            shreyashsri/pbwebsite:${{ steps.meta.outputs.env }}
            shreyashsri/pbwebsite:${{ steps.meta.outputs.env }}-${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update manifest in infra repo
        env:
          PAT: ${{ secrets.INFRA_PAT }}
        run: |
          ENV="${{ steps.meta.outputs.env }}"
          IMAGE_TAG="${ENV}-${{ steps.meta.outputs.sha_short }}"
          git clone https://${PAT}@github.com/pointblank-club/infra.git infra
          cd infra
          sed -i "s|image: shreyashsri/pbwebsite:.*|image: shreyashsri/pbwebsite:${IMAGE_TAG}|" \
            argocd/pbwebsite/${ENV}/deployment.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add argocd/pbwebsite/${ENV}/deployment.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(${ENV}): update pbwebsite image to ${IMAGE_TAG}"
          git push
